name: Update market data

on:
  schedule:
    # 18:30 Asia/Shanghai, after the Hong Kong and Korea market closes.
    - cron: "30 10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Update CSV data
        run: python scripts/update_prices.py

      - name: Commit and push changes
        run: |
          if git diff --quiet -- 7709_price.csv sk_price.csv; then
            echo "No market data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 7709_price.csv sk_price.csv
          git commit -m "chore: update market data"
          git push origin HEAD:main
